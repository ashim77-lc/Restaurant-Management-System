<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-danger px-4">
        <span class="navbar-brand">🍽️ Menu Management</span>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">← Home</a>
            <a href="/menu/add" class="btn btn-warning btn-sm">+ Add Item</a>
        </div>
    </nav>

    <div class="container mt-4">
         <form method="GET" action="{{ url_for('search') }}" class="mb-3 d-flex">
            <input type="text" name="q" class="form-control me-2" placeholder="Search menu..." value="{{ query or '' }}">
            <button class="btn btn-primary">Search</button>
        </form>
        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item["id"] }}</td>
                    <td>{{ item["name"] }}</td>
                    <td>{{ item["category"] }}</td>
                    <td>Rs. {{ item["price"] }}</td>
                    <td>
                        <a href="{{ url_for('edit', id=item['id']) }}" class="btn btn-primary btn-sm">Edit</a>
                        <form action="/menu/delete/{{ item['id'] }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" class="text-center text-muted">No menu items yet!</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
