<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Menu Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4">
            <h4 class="mb-4">➕ Add Menu Item</h4>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
            <form action="/menu/add" method="POST">
                <div class="mb-3">
                    <label>Item Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Category</label>
                    <input type="text" name="category" class="form-control" placeholder="e.g. Drinks, Food, Dessert">
                </div>
                <div class="mb-3">
                    <label>Price (Rs.)</label>
                    <input type="number" name="price" class="form-control" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-danger w-100">Add Item</button>
                <a href="/menu" class="btn btn-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
