<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Bill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4" style="max-width: 600px;">
        <div class="card p-4">
            <h4 class="mb-1">🧾 Bill — Table {{ order["table_number"] }}</h4>
            <small class="text-muted mb-4 d-block">{{ order["created_at"] }}</small>

            <table class="table table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item["name"] }}</td>
                        <td>Rs. {{ item["price"] }}</td>
                        <td>{{ item["quantity"] }}</td>
                        <td>Rs. {{ item["subtotal"] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
                <tfoot>
                    <tr class="table-success">
                        <th colspan="3">Total</th>
                        <th>Rs. {{ total }}</th>
                    </tr>
                </tfoot>
            </table>

            <a href="/order/complete/{{ order['id'] }}" class="btn btn-success w-100">✔ Complete Order</a>
            <a href="/" class="btn btn-secondary w-100 mt-2">← Back</a>
        </div>
    </div>
</body>
</html>
