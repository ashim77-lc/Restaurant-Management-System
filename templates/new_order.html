<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4" style="max-width: 600px;">
        <div class="card p-4">
            <h4 class="mb-4">🧾 New Order</h4>
            <form action="/order/new" method="POST">
                <div class="mb-4">
                    <label>Table Number</label>
                    <input type="number" name="table_number" class="form-control" required>
                </div>
                <h5>Select Items:</h5>
                {% for item in items %}
                <div class="d-flex justify-content-between align-items-center mb-2 p-2 border rounded">
                    <div>
                        <strong>{{ item["name"] }}</strong>
                        <span class="text-muted ms-2">Rs. {{ item["price"] }}</span>
                        <input type="hidden" name="menu_id" value="{{ item['id'] }}">
                    </div>
                    <input type="number" name="quantity" class="form-control w-25" value="0" min="0">
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-danger w-100 mt-3">Place Order</button>
                <a href="/" class="btn btn-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
